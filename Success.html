<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Booking Confirmed — StayVenture</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-solid" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><span class="logo-icon">✦</span><span>StayVenture</span></a>
    <div class="nav-auth"><a href="index.html" class="btn-nav-ghost">Back to Home</a></div>
  </div>
</nav>
<div class="success-page">
  <div class="success-card">
    <div class="success-icon">✅</div>
    <h2>Booking <em>Confirmed!</em></h2>
    <p>Your adventure is officially booked. Check your email for confirmation details and itinerary.</p>
    <div class="booking-ref">
      <div class="ref-label">Booking Reference</div>
      <div class="ref-code" id="bookingRef">SV-2025-XXXX</div>
    </div>
    <div class="success-details" id="successDetails"></div>
    <!-- Feedback -->
    <div style="background:var(--bg-warm);border-radius:14px;padding:20px;border:1px solid var(--border);margin-bottom:24px">
      <h4 style="margin-bottom:12px;font-size:1rem">⭐ Rate Your Experience</h4>
      <div class="star-rating" id="starRating">
        <button class="star-btn" onclick="setRating(1)">☆</button>
        <button class="star-btn" onclick="setRating(2)">☆</button>
        <button class="star-btn" onclick="setRating(3)">☆</button>
        <button class="star-btn" onclick="setRating(4)">☆</button>
        <button class="star-btn" onclick="setRating(5)">☆</button>
      </div>
      <textarea id="feedbackText" rows="2" placeholder="Share your experience..." style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.85rem;outline:none;resize:none;margin-bottom:10px"></textarea>
      <button class="btn-primary" style="width:100%;padding:12px" onclick="submitFeedback()">Submit Feedback</button>
      <div id="feedbackMsg" style="display:none;margin-top:8px;padding:10px;background:#dcfce7;color:#166534;border-radius:8px;font-size:.82rem;text-align:center">✅ Thank you for your feedback!</div>
    </div>
    <div class="success-actions">
      <a href="Destination.html" class="btn-primary" style="text-align:center;padding:14px;border-radius:14px;text-decoration:none">🌍 Explore More Destinations</a>
      <a href="Destination.html" class="btn-secondary" style="text-align:center;padding:14px;border-radius:14px;text-decoration:none;border:1.5px solid var(--border);color:var(--text-mid)">📋 View My Bookings</a>
    </div>
  </div>
</div>
<div class="global-toast" id="globalToast"></div>
<script src="script.js"></script>
</body>
</html>
